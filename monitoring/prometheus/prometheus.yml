# Prometheus Configuration for EnvVault
# Scrapes metrics from the Node.js backend service

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # EnvVault Backend API metrics
  - job_name: 'envvault-backend'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:3001']
        labels:
          service: 'backend'
          environment: 'docker'
