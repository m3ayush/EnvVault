# Grafana Dashboard Provisioning — auto-load dashboards from JSON files
apiVersion: 1

providers:
  - name: 'EnvVault Dashboards'
    orgId: 1
    folder: 'EnvVault'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
