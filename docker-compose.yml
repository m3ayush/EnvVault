services:
  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./envvault-web
      args:
        VITE_API_URL: ""  # empty = use nginx proxy (relative /api/)
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - envvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Node.js Backend API ────────────────────────────────────────────────────
  backend:
    build: ./envvault-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ML_SERVICE_URL=http://ml-service:8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - backend-data:/app/data
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - envvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Python ML Service (Flask + IsolationForest) ────────────────────────────
  ml-service:
    build: ./envvault-ml
    ports:
      - "8000:8000"
    environment:
      - ML_SERVICE_PORT=8000
      - MLFLOW_TRACKING_URI=http://mlflow:5050
    networks:
      - envvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5050
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlartifacts
    ports:
      - "5050:5050"
    volumes:
      - ./envvault-ml/mlruns:/mlflow/mlruns
      - ./envvault-ml/mlartifacts:/mlflow/mlartifacts
    networks:
      - envvault-net
    restart: unless-stopped

  # ── Prometheus (Metrics Collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - envvault-net
    restart: unless-stopped

  # ── Grafana (Visualization Dashboard) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=envvault
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - envvault-net
    restart: unless-stopped

volumes:
  backend-data:
  prometheus-data:
  grafana-data:

networks:
  envvault-net:
    driver: bridge
